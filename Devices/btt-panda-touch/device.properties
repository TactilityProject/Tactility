[general]
vendor=BigTreeTech
name=Panda Touch,K Touch

[apps]
launcherAppId=Launcher

[hardware]
target=ESP32S3
flashSize=16MB
spiRam=true
spiRamMode=OCT
spiRamSpeed=120M
esptoolFlashFreq=120M
bluetooth=true

[display]
size=5"
shape=rectangle
dpi=187

[lvgl]
colorDepth=16
fontSize=18

[sdkconfig]
CONFIG_FATFS_VOLUME_COUNT=4
CONFIG_VFS_MAX_COUNT=8
CONFIG_USB_HOST_HUBS_SUPPORTED=y
CONFIG_USB_HOST_DEBOUNCE_DELAY_MS=500
CONFIG_USB_HOST_RESET_HOLD_MS=100
CONFIG_USB_HOST_RESET_RECOVERY_MS=100
CONFIG_USB_HOST_SET_ADDR_RECOVERY_MS=500
