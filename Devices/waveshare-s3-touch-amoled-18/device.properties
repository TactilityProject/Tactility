[display]
shape=rectangle
dpi=310
width=368
height=448

[lvgl]
colorDepth=16
uiDensity=compact
fontSize=14
statusbarIconSize=16
launcherIconSize=36

[sdkconfig]
CONFIG_I2C_SKIP_LEGACY_CONFLICT_CHECK=y
CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP=n