[general]
vendor=Waveshare
name=S3 Touch AMOLED 1.8"
incubating=true

[apps]
launcherAppId=Launcher
autoStartAppId=

[hardware]
target=ESP32S3
flashSize=16MB
spiRam=true
spiRamMode=OCT
spiRamSpeed=80M
tinyUsb=true
